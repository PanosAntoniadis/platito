defaults:
  - _self_
  - data: mdcath
  - model: platito
  - model/fm: r3n_fm
  - model/nn@model.velocity_net: velocity
  - model/nn@model.condition_net: condition
  - model/lr_scheduler: null
  - callbacks: default
  - logger: wandb # or null to avoid logging
  - trainer: gpu
  - paths: default
  - hydra: default

task_name: "train_platito"
train: True

trainer:
  max_epochs: 1000
  log_every_n_steps: 100
  gradient_clip_val: 0.1

ckpt_path:
